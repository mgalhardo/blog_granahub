name: Deploy Blog to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkou Codte
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm ci

      - name: Build Static Site
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          SEARCH_CONSOLE_SITE_URL: ${{ secrets.SEARCH_CONSOLE_SITE_URL }}
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy to Hostinger via SFTP (lftp)
        env:
          SS_HOST: ${{ secrets.FTP_SERVER }}
          SS_USER: ${{ secrets.FTP_USERNAME }}
          SS_PASS: ${{ secrets.FTP_PASSWORD }}
      run: |
          lftp -e "
          set sftp:password \"$SS_PASS\";
          set sftp:auto-confirm yes;
          set net:timeout 60;
          set net:max-retries 3;
          set net:reconnect-interval-base 5;
          open -u \"$SS_USER\" sftp://$SS_HOST:65002;
          cd domains/blog.granahub.com.br/public_html;
          mirror -R --delete ./out/ .;
          bye"
