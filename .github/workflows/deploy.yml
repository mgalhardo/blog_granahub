name: Deploy Blog to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Build Static Site
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          SEARCH_CONSOLE_SITE_URL: ${{ secrets.SEARCH_CONSOLE_SITE_URL }}
        run: npm run build

      - name: Install lftp and sshpass
        run: sudo apt-get update && sudo apt-get install -y lftp sshpass

      - name: Deploy to Hostinger via SFTP (lftp)
        env:
          SS_HOST: ${{ secrets.FTP_SERVER }}
          SS_USER: ${{ secrets.FTP_USERNAME }}
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          cat > /tmp/lftp_script.txt << 'LFTP_EOF'
          set sftp:auto-confirm yes
          set net:timeout 60
          set net:max-retries 3
          set net:reconnect-interval-base 5
          cd domains/blog.granahub.com.br/public_html
          mirror -R --delete ./out/ .
          bye
          LFTP_EOF

          sshpass -e lftp -u "$SS_USER," sftp://$SS_HOST:65002 < /tmp/lftp_script.txt
