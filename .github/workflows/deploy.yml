name: Deploy Blog to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm ci

      - name: Build Static Site
        run: npm run build

      - name: Deploy to Hostinger via SFTP
        run: |
          sudo apt-get install -y sshpass
          sshpass -p "${{ secrets.FTP_PASSWORD }}" rsync -avz --delete \
            --no-implied-dirs \
            --include='/.htaccess' \
            -e "ssh -o StrictHostKeyChecking=no -p 65002" \
            ./out/ ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}:/home/u624347113/domains/blog.granahub.com.br/public_html/
          echo "✅ Deploy concluído com sucesso!"
