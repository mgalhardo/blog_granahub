name: "Daily AI Post Generator"
on:
  schedule:
    - cron: '0 10 * * *' # Roda todo dia às 10:00 UTC (07:00 AM no Brasil)
  workflow_dispatch: # Permite rodar manualmente no botão do GitHub

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run AI Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LOCAL_AI_URL: ${{ secrets.LOCAL_AI_URL }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node tools/agent.mjs

      - name: Commit and Push
        id: push_step
        run: |
          git config --global user.name "GranaHub Robot"
          git config --global user.email "robot@granahub.com.br"
          git add .
          
          # Verifica se há algo para commitar
          if [ -z "$(git status --porcelain)" ]; then
            echo "⚠️ Nenhum novo post foi detectado. Encerrando sem erro."
            exit 0
          fi

          git commit -m "🤖 Novo Post Automático: $(date +'%Y-%m-%d')"
          
          # Tenta puxar mudanças recentes para evitar conflitos
          git pull --rebase origin main
          
          # Tenta o push com retry simples
          git push origin main || (sleep 5 && git push origin main)

      - name: Notify Telegram on Failure
        if: failure()
        run: |
          node -e "
            const message = '*❌ Erro na Automação do GranaHub!*\\n\\nOcorreu um erro no workflow \"Daily AI Post Generator\".\\n\\n*Possíveis causas:*\\n- Falha na geração da IA (limites de cota)\\n- Problemas com as chaves de API\\n- Erro de sincronização no GitHub\\n\\nVerifique os logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}';
            const url = 'https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage';
            fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ chat_id: '${{ secrets.TELEGRAM_CHAT_ID }}', text: message, parse_mode: 'Markdown' })
            }).then(() => console.log('Aviso de erro enviado')).catch(e => console.error(e));
          "
