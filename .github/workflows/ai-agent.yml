name: "Daily AI Post Generator"
on:
  schedule:
    - cron: '0 10 * * *' # Roda todo dia às 10:00 UTC (07:00 AM no Brasil)
  workflow_dispatch: # Permite rodar manualmente no botão do GitHub

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run AI Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LOCAL_AI_URL: ${{ secrets.LOCAL_AI_URL }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: node tools/agent.mjs

      - name: Commit and Push
        id: push_step
        run: |
          git config --global user.name "GranaHub Robot"
          git config --global user.email "robot@granahub.com.br"
          git add .
          
          if [ -z "$(git status --porcelain)" ]; then
            echo "⚠️ Nenhum novo post foi detectado. Encerrando sem erro."
            echo "HAS_CHANGES=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          git commit -m "🤖 Novo Post Automático: $(date +'%Y-%m-%d')"
          echo "HAS_CHANGES=true" >> $GITHUB_OUTPUT
          
          git pull --rebase origin main
          git push origin main || (sleep 5 && git push origin main)

      # --- INÍCIO DO DEPLOY AUTOMÁTICO ---
      - name: Build Static Site
        if: steps.push_step.outputs.HAS_CHANGES == 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          SEARCH_CONSOLE_SITE_URL: ${{ secrets.SEARCH_CONSOLE_SITE_URL }}
        run: npm run build

      - name: Install lftp
        if: steps.push_step.outputs.HAS_CHANGES == 'true'
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy to Hostinger via SFTP
        if: steps.push_step.outputs.HAS_CHANGES == 'true'
        env:
          SFTP_HOST: ${{ secrets.FTP_SERVER }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "$SFTP_USER","$SFTP_PASS" sftp://$SFTP_HOST:65002 -e "
          set sftp:auto-confirm yes;
          set net:timeout 60;
          mirror -R --delete --verbose ./out/ /home/u624347113/domains/blog.granahub.com.br/public_html;
          bye"

      - name: Notify Telegram on Success
        if: success() && steps.push_step.outputs.HAS_CHANGES == 'true'
        run: |
          node -e "
            const message = '*✅ GranaHub Publicado!*\\n\\nA nova matéria já está no ar e o site foi atualizado.';
            const url = 'https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage';
            fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ chat_id: '${{ secrets.TELEGRAM_CHAT_ID }}', text: message, parse_mode: 'Markdown' })
            }).then(() => console.log('Sucesso notificado')).catch(e => console.error(e));
          "
      # --- FIM DO DEPLOY AUTOMÁTICO ---

      - name: Notify Telegram on Failure
        if: failure()
        run: |
          node -e "
            const message = '*❌ Erro na Automação do GranaHub!*\\n\\nOcorreu um erro no workflow ou no deploy.\\n\\nVerifique os logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}';
            const url = 'https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage';
            fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ chat_id: '${{ secrets.TELEGRAM_CHAT_ID }}', text: message, parse_mode: 'Markdown' })
            }).then(() => console.log('Aviso de erro enviado')).catch(e => console.error(e));
          "
