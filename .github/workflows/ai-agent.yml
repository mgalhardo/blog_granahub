name: "Daily AI Post Generator"
on:
  schedule:
    - cron: '0 10 * * *' # Roda todo dia às 10:00 UTC
  workflow_dispatch: # Permite rodar manualmente no botão do GitHub

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run AI Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: node tools/agent.mjs

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "🤖 Novo Post sugerido pelo Robô GranaHub"
          title: "Novo Post de IA Disponível para Aprovação"
          body: |
            O robô gerou um novo post baseado em tendências financeiras ou nas sugestões!
            Por favor, revise o markdown gerado e se gostar, clique em "Merge" para publicar no ar.
          branch: "ai-new-post-${{ github.run_id }}"
